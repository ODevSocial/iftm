<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerar Hash</title>
</head>
<body>

<button onclick="gerar()">Gerar senha</button>

<script type="module">
import bcrypt from 'https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/+esm';

window.gerar = async function () {
  const usuarios = [
    { username: "wilton.filho", password: "wilton123" },
    { username: "maria.jose", password: "123maria" },
    { username: "teste1", password: "teste111" },
    { username: "teste2", password: "222teste" },
    { username: "ana.carol", password: "ana123carol" }
  ];

  const usuariosHash = usuarios.map(user => {
    const salt = bcrypt.genSaltSync(10);
    const hash = bcrypt.hashSync(user.password, salt);

    return {
      username: user.username,
      password: hash
    };
  });

  console.log(JSON.stringify(usuariosHash, null, 2));
};
</script>

</body>
</html>
