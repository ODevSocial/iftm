<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamo: Cadastro</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>

<body>
    <main>
        <div class="cadastro-container">
            <h2>Cadastro</h2>
            <form id="cadastroForm">
                <input type="text" id="username" placeholder="Usuário">
                <input type="password" id="password" placeholder="Senha">
                <input type="password" id="confirmPassword" placeholder="Confirmar Senha">
                <button type="submit" id="cadastroBtn">Cadastrar</button>
            </form>
            <p id="cadastroError" style="display: none;"></p>
            <a href="index.html">Entrar!</a>
        </div>
    </main>

    <script src="script/scriptCadastrar.js"></script>
</body>

</html>
